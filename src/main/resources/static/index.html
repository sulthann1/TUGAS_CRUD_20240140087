<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ktp Crud System</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');


        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }


        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #f1f5f9;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
        }


        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        input, select {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }


        .btn-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            font-size: 0.9rem;
            flex: 1;
        }

        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .btn-secondary { background-color: var(--text-muted); }
        .btn-secondary:hover { background-color: #475569; }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 6px;
            flex: none;
        }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: #dc2626; }


        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        th {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            background-color: #f8fafc;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td { font-size: 0.9rem; }

        tbody tr { transition: background-color 0.2s; }
        tbody tr:hover { background-color: #f1f5f9; }


        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast-success { background-color: #10b981; }
        .toast-error { background-color: var(--danger); }


        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <div class="card">
        <h2>Form Data KTP</h2>
        <form id="ktpForm">
            <input type="hidden" id="idKtp">

            <div class="form-group">
                <label>Nomor KTP</label>
                <input type="text" id="nomorKtp" placeholder="Masukkan 16 digit NIK" required>
            </div>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="namaLengkap" placeholder="Nama sesuai KTP" required>
            </div>

            <div class="form-group">
                <label>Alamat</label>
                <input type="text" id="alamat" placeholder="Alamat domisili" required>
            </div>

            <div class="form-group">
                <label>Tanggal Lahir</label>
                <input type="date" id="tanggalLahir" required>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin</label>
                <select id="jenisKelamin" required>
                    <option value="" disabled selected>-- Pilih --</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary" id="btnSave">Simpan</button>
                <button type="button" class="btn btn-secondary" onclick="resetForm()">Batal</button>
            </div>
        </form>
    </div>

    <div class="card" style="overflow-x: auto;">
        <h2>Daftar Penduduk</h2>
        <table>
            <thead>
            <tr>
                <th>No KTP</th>
                <th>Nama</th>
                <th>Alamat</th>
                <th>Tgl Lahir</th>
                <th>Gender</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8080/ktp";

    $(document).ready(function() {
        loadData();

        $("#ktpForm").submit(function(e) {
            e.preventDefault();
            saveData();
        });
    });


    function showMessage(msg, isError = false) {
        const toast = $("#toast");
        toast.text(msg)
             .removeClass("toast-success toast-error")
             .addClass(isError ? "toast-error" : "toast-success")
             .fadeIn();

        setTimeout(() => toast.fadeOut(), 3000);
    }

    function resetForm() {
        $("#idKtp").val("");
        $("#nomorKtp").val("");
        $("#namaLengkap").val("");
        $("#alamat").val("");
        $("#tanggalLahir").val("");
        $("#jenisKelamin").val("");
        $("#btnSave").text("Simpan");
    }

    function loadData() {
        $.ajax({
            url: API_URL,
            type: "GET",
            success: function(response) {
                let rows = "";
                if(response.data.length === 0) {
                    rows = `<tr><td colspan="6" style="text-align:center; color:#64748b;">Belum ada data KTP</td></tr>`;
                } else {
                    response.data.forEach(ktp => {
                        rows += `<tr>
                            <td><strong>${ktp.nomorKtp}</strong></td>
                            <td>${ktp.namaLengkap}</td>
                            <td>${ktp.alamat}</td>
                            <td>${ktp.tanggalLahir}</td>
                            <td>${ktp.jenisKelamin}</td>
                            <td>
                                <button class="btn btn-primary btn-sm" onclick="editData(${ktp.id})">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteData(${ktp.id})">Hapus</button>
                            </td>
                        </tr>`;
                    });
                }
                $("#tableBody").html(rows);
            },
            error: function() { showMessage("Gagal terhubung ke server Backend", true); }
        });
    }

    function saveData() {
        const id = $("#idKtp").val();
        const payload = {
            nomorKtp: $("#nomorKtp").val(),
            namaLengkap: $("#namaLengkap").val(),
            alamat: $("#alamat").val(),
            tanggalLahir: $("#tanggalLahir").val(),
            jenisKelamin: $("#jenisKelamin").val()
        };

        $.ajax({
            url: id ? `${API_URL}/${id}` : API_URL,
            type: id ? "PUT" : "POST",
            contentType: "application/json",
            data: JSON.stringify(payload),
            success: function(response) {
                showMessage(response.message);
                resetForm();
                loadData();
            },
            error: function(xhr) {
                showMessage(xhr.responseJSON?.message || "Terjadi kesalahan", true);
            }
        });
    }

    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: "GET",
            success: function(response) {
                const data = response.data;
                $("#idKtp").val(data.id);
                $("#nomorKtp").val(data.nomorKtp);
                $("#namaLengkap").val(data.namaLengkap);
                $("#alamat").val(data.alamat);
                $("#tanggalLahir").val(data.tanggalLahir);
                $("#jenisKelamin").val(data.jenisKelamin);
                $("#btnSave").text("Update Data");
            }
        });
    }

    function deleteData(id) {
        if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: "DELETE",
                success: function(response) {
                    showMessage(response.message);
                    loadData();
                },
                error: function() { showMessage("Gagal menghapus data", true); }
            });
        }
    }
</script>
</body>
</html>
