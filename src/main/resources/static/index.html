<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KTP CRUD SYSTEM</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; }
        input, select { padding: 5px; width: 250px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; cursor: pointer; margin-right: 5px; }
        #message { margin-bottom: 15px; padding: 10px; display: none; border-radius: 4px;}
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;}
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;}
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>
<body>

<h2>Manajemen Data KTP</h2>

<div id="message"></div>

<form id="ktpForm">
    <input type="hidden" id="idKtp">
    <div class="form-group">
        <label>Nomor KTP:</label>
        <input type="text" id="nomorKtp" required>
    </div>
    <div class="form-group">
        <label>Nama Lengkap:</label>
        <input type="text" id="namaLengkap" required>
    </div>
    <div class="form-group">
        <label>Alamat:</label>
        <input type="text" id="alamat" required>
    </div>
    <div class="form-group">
        <label>Tanggal Lahir:</label>
        <input type="date" id="tanggalLahir" required>
    </div>
    <div class="form-group">
        <label>Jenis Kelamin:</label>
        <select id="jenisKelamin" required>
            <option value="">-- Pilih --</option>
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
        </select>
    </div>
    <button type="submit" class="btn" id="btnSave">Simpan Data</button>
    <button type="button" class="btn" onclick="resetForm()">Batal</button>
</form>

<table>
    <thead>
    <tr>
        <th>No KTP</th>
        <th>Nama</th>
        <th>Alamat</th>
        <th>Tgl Lahir</th>
        <th>Gender</th>
        <th>Aksi</th>
    </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    const API_URL = "http://localhost:8080/ktp";

    $(document).ready(function() {
        loadData();

        $("#ktpForm").submit(function(e) {
            e.preventDefault();
            saveData();
        });
    });

    function showMessage(msg, isError = false) {
        const box = $("#message");
        box.text(msg).removeClass("success error").addClass(isError ? "error" : "success").fadeIn();
        setTimeout(() => box.fadeOut(), 3000);
    }

    function resetForm() {
        $("#idKtp").val("");
        $("#nomorKtp").val("");
        $("#namaLengkap").val("");
        $("#alamat").val("");
        $("#tanggalLahir").val("");
        $("#jenisKelamin").val("");
        $("#btnSave").text("Simpan Data");
    }

    function loadData() {
        $.ajax({
            url: API_URL,
            type: "GET",
            success: function(response) {
                let rows = "";
                response.data.forEach(ktp => {
                    rows += `<tr>
                        <td>${ktp.nomorKtp}</td>
                        <td>${ktp.namaLengkap}</td>
                        <td>${ktp.alamat}</td>
                        <td>${ktp.tanggalLahir}</td>
                        <td>${ktp.jenisKelamin}</td>
                        <td>
                            <button class="btn" onclick="editData(${ktp.id})">Edit</button>
                            <button class="btn" onclick="deleteData(${ktp.id})">Hapus</button>
                        </td>
                    </tr>`;
                });
                $("#tableBody").html(rows); // Sisipkan ke dalam tbody
            },
            error: function() {
                showMessage("Gagal mengambil data dari server", true);
            }
        });
    }

    function saveData() {
        const id = $("#idKtp").val();
        const payload = {
            nomorKtp: $("#nomorKtp").val(),
            namaLengkap: $("#namaLengkap").val(),
            alamat: $("#alamat").val(),
            tanggalLahir: $("#tanggalLahir").val(),
            jenisKelamin: $("#jenisKelamin").val()
        };

        const type = id ? "PUT" : "POST";
        const url = id ? `${API_URL}/${id}` : API_URL;

        $.ajax({
            url: url,
            type: type,
            contentType: "application/json",
            data: JSON.stringify(payload),
            success: function(response) {
                showMessage(response.message);
                resetForm();
                loadData(); // Refresh isi tabel
            },
            error: function(xhr) {
                showMessage(xhr.responseJSON?.message || "Terjadi kesalahan", true);
            }
        });
    }

    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: "GET",
            success: function(response) {
                const data = response.data;
                $("#idKtp").val(data.id);
                $("#nomorKtp").val(data.nomorKtp);
                $("#namaLengkap").val(data.namaLengkap);
                $("#alamat").val(data.alamat);
                $("#tanggalLahir").val(data.tanggalLahir);
                $("#jenisKelamin").val(data.jenisKelamin);
                $("#btnSave").text("Update Data"); // Ubah teks tombol
            }
        });
    }

    function deleteData(id) {
        if (confirm("Apakah Anda yakin ingin menghapus data KTP ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: "DELETE",
                success: function(response) {
                    showMessage(response.message);
                    loadData(); // Refresh isi tabel
                },
                error: function() {
                    showMessage("Gagal menghapus data", true);
                }
            });
        }
    }
</script>
</body>
</html>
